# DevTeam Project Configuration
# Copy this to your project's .devteam/config.yaml and customize

version: "2.0"  # bumped for v6.0 pipeline additions

# Project metadata
project:
  name: ""  # Auto-detected from build.gradle.kts if empty
  type: auto  # auto, kotlin-spring, library, fullstack

# ============================================================================
# KOTLIN + SPRING SKILLS (v6.0)
# ============================================================================
kotlin_skills:
  source: skills/kotlin

# ============================================================================
# PIPELINE (v6.0)
# ============================================================================
pipeline:
  stages: [analytics, development, testing]
  parallelism: intra-stage  # between stages = sequential, within = parallel
  skip_stage: null  # or "analytics" | "development" | "testing"

  # Per-agent retry on failure
  retry:
    per_agent: 2
    on_failure: halt_stage  # halt_stage | skip_failed_agent | halt_pipeline

  # Coverage threshold for Stage 3
  coverage:
    threshold: 80  # percent

  # Human-in-the-Loop (HITL) gate (NEW in v6.1)
  hitl:
    enabled: true             # always-on for production safety
    after_stage: development  # pause before this stage
    pause_on: [analytics]     # alternative: trigger by stage completion
    resume_actions:           # what the user can do at HITL
      - approve              # continue to next stage
      - request_changes      # re-run previous stage
      - edit                 # manual edit of analysis.md, then continue
      - abort                # halt pipeline
    headless_fallback: approve  # default action in headless Qwen Code (no UI)

# Per-stage sub-agent configuration
stages:
  analytics:
    sub_agents: [requirements-analyst, db-schema-reader, code-archaeologist, api-spec-reader]
    code_archaeologist_required: false  # true for hybrid, false for greenfield
    api_spec_reader_required: false     # true if OpenAPI/Swagger detected

  development:
    sub_agents: [kotlin-api-developer, kotlin-data-architect, kotlin-config-specialist, kotlin-integration-specialist]
    independent_components_detection: true  # if false, sequential

  testing:
    sub_agents: [kotlin-unit-test-engineer, kotlin-integration-test-engineer, kotlin-e2e-test-engineer]
    coverage_threshold: 80  # percent

# ============================================================================
# QUALITY GATES (KOTLIN TOOLCHAIN)
# ============================================================================
quality_gates:
  required: [tests, typecheck, lint, scope]
  kotlin:
    lint: [ktlint, detekt]
    coverage_tool: kover
    coverage_threshold: 80
    test_command: ./gradlew test integrationTest e2eTest
    build_command: ./gradlew compileKotlin compileTestKotlin
  coverage:
    threshold: 80

# ============================================================================
# HOOKS (v5/v6 — kept for cross-version compatibility)
# ============================================================================
hooks:
  enabled: true
  state_file: .devteam/circuit-breaker.json
  scope_check:
    enabled: true
    forbidden_patterns:
      - "rm -rf /"
      - "DROP DATABASE"
  session_tracking:
    enabled: true
    checkpoint_dir: .devteam/checkpoints

# ============================================================================
# MODEL SELECTION (v5 — kept, no longer driving model choice in v6.0)
# ============================================================================
model_selection:
  # NOTE: strategy is documentation-only; not consumed by code.
  # Model selection is handled by Qwen Code itself (not by DevTeam).
  strategy: fixed
  thresholds:
    simple: 4
    moderate: 8
    complex: 14

# ============================================================================
# ANTI-ABANDONMENT (v5 — kept, enforced via persistence hook)
# ============================================================================
anti_abandonment:
  enabled: true
  max_iterations: 10
  forbidden_phrases:
    - "I cannot"
    - "I'm unable to"
    - "I give up"
    - "You should try manually"
    - "This requires human intervention"
  trigger_on_idle_prompt: true

# ============================================================================
# BUDGET (v5 — kept, observed but not enforced)
# ============================================================================
budget:
  session_budget_usd: 10.00
  daily_budget_usd: 50.00
  warn_at_percent: 80
